name: Build Avalonia Editor

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: Build in Release or Debug?
        required: true
        default: Debug
        type: choice
        options:
          - Debug
          - Release
      platform:
        description: Build on Linux or Windows?
        required: true
        default: Windows
        type: choice
        options:
          - Windows
          - Linux
  workflow_call:
    inputs:
      build-type:
        required: true
        default: Debug
        type: string

jobs:
  #
  # Build Avalonia Editor on Linux
  #
  Linux:
    name: Linux (${{ github.event.inputs.build-type || inputs.build-type }})
    if: ${{ github.event.inputs.platform == 'Linux' || inputs.platform == 'Linux' }} 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install dependencies
        run: |
          sudo apt-get install clang
          sudo apt-get install lld
      - name: Build
        run: dotnet build build/Stride.Editor.Avalonia.slnf -m:1 -nr:false -v:m -p:WarningLevel=0 -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type }} -p:StridePlatforms=Linux -p:StrideGraphicsApis=OpenGL -p:StrideSkipUnitTests=true -p:StrideSkipAutoPack=true -p:StrideEnableCodeAnalysis=true

  #
  # Build Avalonia Editor on Windows
  #
  Windows:
    name: Windows (${{ github.event.inputs.build-type || inputs.build-type }})
    if: ${{ github.event.inputs.platform == 'Windows' || inputs.platform == 'Windows' }} 
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: microsoft/setup-msbuild@v2
      - name: Build
        run: msbuild build\Stride.build -t:BuildAvalonia -m:1 -nr:false -v:m -p:WarningLevel=0 -p:Configuration=${{ github.event.inputs.build-type || inputs.build-type }} -p:StridePlatforms=Windows -p:StrideGraphicsApis=OpenGL -p:StrideSkipUnitTests=true -p:StrideSkipAutoPack=true -p:StrideEnableCodeAnalysis=true
